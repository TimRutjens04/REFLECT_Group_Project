[project]
name = "eai-group-project"
version = "0.1.0"
description = "Multimodal alignment pipeline for RoboFail/REFLECT dataset"
authors = [
    {name = "Tim Rutjens",email = "tim.rutjens@ict.nl"}
]
requires-python = ">=3.11"
dependencies = [
    "opencv-python (>=4.13.0.92,<5.0.0.0)",
    "librosa (>=0.11.0,<0.12.0)",
    "moviepy (>=2.2.1,<3.0.0)",
    "tqdm (>=4.67.3,<5.0.0)",
    "zarr (>=3.1.5,<4.0.0)",
    "numpy (>=2.4.3,<3.0.0)",
    "matplotlib (>=3.10.8,<4.0.0)",
    "wav2clip (>=0.1.0,<0.2.0)",
    "openai-clip (>=1.0.1,<2.0.0)",
    "setuptools (>=82.0.1,<83.0.0)"
]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
